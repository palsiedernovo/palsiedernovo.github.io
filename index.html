  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Malgun Gothic", sans-serif; background: #f5f7fb; color: #222; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px 40px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 16px; }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 28px; }
    h2 { font-size: 20px; }
    .desc { color: #555; line-height: 1.6; }
    .warn { background: #fff7ed; color: #9a3412; border: 1px solid #fdba74; padding: 12px 14px; border-radius: 10px; line-height: 1.6; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
    label { display: block; font-weight: 700; margin-bottom: 6px; }
    input, textarea, select, button { width: 100%; font-size: 14px; border-radius: 10px; }
    input, textarea, select { border: 1px solid #d0d7e2; padding: 10px 12px; background: #fff; outline: none; margin-bottom: 12px; }
    textarea { min-height: 180px; resize: vertical; line-height: 1.5; font-family: Consolas, monospace; }
    button { border: none; padding: 11px 16px; font-weight: 700; cursor: pointer; background: #2563eb; color: #fff; }
    .secondary { background: #e5e7eb; color: #222; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .btn-row button { width: auto; min-width: 130px; }
    pre { margin: 0; background: #111827; color: #e5e7eb; border-radius: 12px; padding: 16px; overflow: auto; min-height: 140px; white-space: pre-wrap; word-break: break-word; line-height: 1.55; font-family: Consolas, monospace; font-size: 13px; }

      const saveDataLength = Array.isArray(preset.udg_saveData) ? preset.udg_saveData : [];
      const saveDataName = Array.isArray(preset.udg_saveDataName) ? preset.udg_saveDataName : [];
      const saveDataCount = saveDataLength.length;
      if (!keySet || !saveDataCount) throw new Error('프리셋에 keySet 또는 saveData가 없음');
      const text = String(fullCode || '').replace(/[\r\n\t ]/g, '');
      const num = Math.ceil(saveDataCount / 30);
      const headerRaw = substringLikeJass(text, 0, saveDataLength[0]);
      const text2 = reverseStr(codeLength2(toNotation2(toIntegerByKeySet(headerRaw, keySet)), num));
      let num2 = 0;
      let text3 = '';
      for (let i = 0; i < num; i += 1) {
        if (text2[i] === '1') {
          num2 += 5;
          const blockRaw = substringLikeJass(text, num2, num2 + saveDataLength[i]);
          text3 += reverseStr(codeLength2(toNotation2(toIntegerByKeySet(blockRaw, keySet)), 30));
        } else {
          text3 += ''.padStart(30, '0');
        }
      }
      if (text3.length > saveDataCount) text3 = text3.substring(0, saveDataCount);
      const array = new Array(saveDataCount).fill(0);
      let cursor = 0;
      for (let i = 0; i < text3.length; i += 1) {
        if (text3[i] === '1') {
          const raw = substringLikeJass(text, cursor, cursor + saveDataLength[i]);
          array[i] = toIntegerByKeySet(raw, keySet);
          cursor += saveDataLength[i];
        }
      }
      const named = {};
      for (let i = 0; i < saveDataCount; i += 1) named[saveDataName[i] || `field_${i}`] = array[i];
      const checksum = getChecksumClassic(preset, idForChecksum, array);
      return { fullCode: text, data: array, named, storedChecksum: array[25] ?? null, calculatedChecksum: checksum, checksumMatched: (array[25] ?? null) === checksum };
    }
    function encodeClassicFromNamed(namedData, preset, idForChecksum) {
      const keySet = preset.udg_keySet || '';
      const saveDataLength = Array.isArray(preset.udg_saveData) ? preset.udg_saveData : [];
      const saveDataName = Array.isArray(preset.udg_saveDataName) ? preset.udg_saveDataName : [];
      const saveDataCount = saveDataLength.length;
      const array = new Array(saveDataCount).fill(0);
      for (let i = 0; i < saveDataCount; i += 1) {
        if (!dataOnBoolean(i)) {
          const fieldName = saveDataName[i];
          const rawValue = Number(namedData[fieldName] ?? 0);
          const max = Math.pow(keySet.length, saveDataLength[i]);
          array[i] = rawValue < max ? rawValue : Math.floor(max - 1);
        }
      }
      let bitText = '';
      for (let j = 0; j < saveDataCount; j += 1) bitText += ((array[j] === 0 && !dataOnBoolean(j)) ? '0' : '1');
      const blockCount = Math.ceil(saveDataCount / 30);
      for (let k = 0; k < blockCount; k += 1) array[k + 1] = toInteger2(reverseStr(substringLikeJass(bitText, k * 30, (k + 1) * 30)));
      let topBits = '1';
      let num3 = 1;
      while (num3 < saveDataCount && num3 < 30) { topBits += ((array[num3] === 0 && num3 !== 25) ? '0' : '1'); num3 += 1; }
      array[1] = toInteger2(reverseStr(topBits));
      array[0] = toInteger2(reverseStr(substringLikeJass(topBits, 1, 25)));
      array[25] = getChecksumClassic(preset, idForChecksum, array);
      let packed = '';
      for (let i = 0; i < saveDataCount; i += 1) if (array[i] !== 0) packed += codeLengthByKeySet(toNotationByKeySet(array[i], keySet), saveDataLength[i], keySet);
      const parts = [];
      const chunkCount = Math.ceil(packed.length / 127);
      for (let j = 0; j < chunkCount; j += 1) parts.push(substringLikeJass(packed, j * 127, (j + 1) * 127));
      return { data: array, code: packed, code1: parts[0] || '', code2: parts[1] || '', code3: parts.slice(2).join('') || '' };
    }
    function setQuickFieldsFromDecoded(decoded) {
      const data = decoded.data || [];
      const itemMap = { f28: 27, f33: 32, f38: 37, f43: 42, f48: 47, f53: 52 };
      Object.entries(itemMap).forEach(([fieldId, idx]) => {
        ensureSelectHasValue(fieldId, data[idx] ?? 0);
        const el = getEl(fieldId);
        if (el) el.value = String(data[idx] ?? 0);
      });
      const beforeStr = String(originalStats.Str || data[41] || 0);
      const beforeAgi = String(originalStats.Agi || data[46] || 0);
      const beforeInt = String(originalStats.Int || data[51] || 0);
      if (getEl('beforeStr')) getEl('beforeStr').value = beforeStr;
      if (getEl('beforeAgi')) getEl('beforeAgi').value = beforeAgi;
      if (getEl('beforeInt')) getEl('beforeInt').value = beforeInt;
      if (getEl('f42')) getEl('f42').value = beforeStr;
      if (getEl('f47')) getEl('f47').value = beforeAgi;
      if (getEl('f52')) getEl('f52').value = beforeInt;
      ensureSelectHasValue('f57', data[56] ?? 0, 'character');
      if (getEl('f57')) getEl('f57').value = String(data[56] ?? 0);
      if (getEl('f162')) getEl('f162').value = String(data[161] ?? 0);
      syncStatPreview();
    }
    function applyQuickFieldsToNamedData(namedData) {
      const names = DEFAULT_PRESET.udg_saveDataName;
      if (names[27] && getEl('f28')) namedData[names[27]] = Number(getEl('f28').value || 0);
      if (names[32] && getEl('f33')) namedData[names[32]] = Number(getEl('f33').value || 0);
      if (names[37] && getEl('f38')) namedData[names[37]] = Number(getEl('f38').value || 0);
      if (names[42] && getEl('f43')) namedData[names[42]] = Number(getEl('f43').value || 0);
      if (names[47] && getEl('f48')) namedData[names[47]] = Number(getEl('f48').value || 0);
      if (names[52] && getEl('f53')) namedData[names[52]] = Number(getEl('f53').value || 0);
      if (names[41] && getEl('f42')) namedData[names[41]] = capStatForCode(getEl('f42').value || 0);
      if (names[46] && getEl('f47')) namedData[names[46]] = capStatForCode(getEl('f47').value || 0);
      if (names[51] && getEl('f52')) namedData[names[51]] = capStatForCode(getEl('f52').value || 0);
      if (names[56] && getEl('f57')) namedData[names[56]] = Number(getEl('f57').value || 0);
      if (names[161] && getEl('f162')) namedData[names[161]] = Number(getEl('f162').value || 0);
      return namedData;
    }
    function parsePreloadText(raw) {
      const text = String(raw || '');
      const parsed = {
        code1:'', code2:'', code3:'',
        ULbag1:'0/0/0/0/0/0', ULbag1Ch:'0/0/0/0/0/0',
        ULbag2:'0/0/0/0/0/0', ULbag2Ch:'0/0/0/0/0/0',
        ULbag3:'0/0/0/0/0/0', ULbag3Ch:'0/0/0/0/0/0',
        ULbag4:'0/0/0/0/0/0', ULbag4Ch:'0/0/0/0/0/0',
        ULbag5:'0/0/0/0/0/0', ULbag5Ch:'0/0/0/0/0/0',
        ID:'', Str:'', Agi:'', Int:''
      };
      const code1 = text.match(/Code1:\s*([^"\r\n]+)/i);
      const code2 = text.match(/Code2:\s*([^"\r\n]+)/i);
      const code3 = text.match(/Code3:\s*([^"\r\n]+)/i);
      if (code1) parsed.code1 = code1[1].trim();
      if (code2) parsed.code2 = code2[1].trim();
      if (code3) parsed.code3 = code3[1].trim();
      for (let i = 1; i <= 5; i += 1) {
        const re = new RegExp(`ULbag${i}:([^,\"\\r\\n]+),ULbag${i}Ch:([^\"\\r\\n]+)`, 'i');
        const m = text.match(re);
        if (m) {
          parsed[`ULbag${i}`] = m[1].trim();
          parsed[`ULbag${i}Ch`] = m[2].trim();
        }
      }
      ['ID','Str','Agi','Int'].forEach(key => {
        const re = new RegExp(`${key}:\\s*([^\"\\r\\n]+)`, 'i');
        const m = text.match(re);
        if (m) parsed[key] = m[1].trim();
      });
      return parsed;
    }
    function applyParsedPreload(parsed) {
      originalStats = { Str: parsed.Str || '', Agi: parsed.Agi || '', Int: parsed.Int || '' };
      ulbagData = {
        ULbag1: parsed.ULbag1 || '0/0/0/0/0/0', ULbag1Ch: parsed.ULbag1Ch || '0/0/0/0/0/0',
        ULbag2: parsed.ULbag2 || '0/0/0/0/0/0', ULbag2Ch: parsed.ULbag2Ch || '0/0/0/0/0/0',
        ULbag3: parsed.ULbag3 || '0/0/0/0/0/0', ULbag3Ch: parsed.ULbag3Ch || '0/0/0/0/0/0',
        ULbag4: parsed.ULbag4 || '0/0/0/0/0/0', ULbag4Ch: parsed.ULbag4Ch || '0/0/0/0/0/0',
        ULbag5: parsed.ULbag5 || '0/0/0/0/0/0', ULbag5Ch: parsed.ULbag5Ch || '0/0/0/0/0/0'
      };
      if (code1El) code1El.value = parsed.code1 || '';
      if (code2El) code2El.value = parsed.code2 || '';
      if (code3El) code3El.value = parsed.code3 || '';
      mergeCodes();
    }
    function applyStatRemap(remap) {
      const fields = { 힘:getEl('f42'), 민:getEl('f47'), 지:getEl('f52') };
      const original = {
        힘: String(fields.힘?.value || ''),
        민: String(fields.민?.value || ''),
        지: String(fields.지?.value || '')
      };
      const next = { 힘: original.힘, 민: original.민, 지: original.지 };
      Object.entries(remap).forEach(([from, to]) => {
        if (!to || !Object.prototype.hasOwnProperty.call(next, to)) return;
        next[to] = original[from];
      });
      if (fields.힘) fields.힘.value = next.힘;
      if (fields.민) fields.민.value = next.민;
      if (fields.지) fields.지.value = next.지;
      syncStatPreview();
    }
    function getStatRemapFromDropdowns() {
      return {
        힘: getEl('statFromStr')?.value || '',
        민: getEl('statFromAgi')?.value || '',
        지: getEl('statFromInt')?.value || ''
      };
    }
    function buildServerJson() {
      const stats = `${getEl('f42')?.value || originalStats.Str || '@@@'}/${getEl('f47')?.value || originalStats.Agi || '@@@'}/${getEl('f52')?.value || originalStats.Int || '@@@'}`;
      return {
        ULbag1: ulbagData.ULbag1 || '0/0/0/0/0/0',
        ULbag1Ch: ulbagData.ULbag1Ch || '0/0/0/0/0/0',
        ULbag2: ulbagData.ULbag2 || '0/0/0/0/0/0',
        ULbag2Ch: ulbagData.ULbag2Ch || '0/0/0/0/0/0',
        ULbag3: ulbagData.ULbag3 || '0/0/0/0/0/0',
        ULbag3Ch: ulbagData.ULbag3Ch || '0/0/0/0/0/0',
        ULbag4: ulbagData.ULbag4 || '0/0/0/0/0/0',
        ULbag4Ch: ulbagData.ULbag4Ch || '0/0/0/0/0/0',
        ULbag5: ulbagData.ULbag5 || '0/0/0/0/0/0',
        ULbag5Ch: ulbagData.ULbag5Ch || '0/0/0/0/0/0',
        Stats: stats,
        Code1: code1El?.value.trim() || '@@@',
        Code2: code2El?.value.trim() || '@@@',
        Code3: code3El?.value.trim() || '@@@'
      };
    }

    getEl('parsePreloadBtn')?.addEventListener('click', () => {
      const parsed = parsePreloadText(rawPreloadEl?.value);
      applyParsedPreload(parsed);
      if (serverJsonBoxEl) serverJsonBoxEl.textContent = JSON.stringify(buildServerJson(), null, 2);
    });
    getEl('samplePreloadBtn')?.addEventListener('click', () => {
      if (rawPreloadEl) rawPreloadEl.value = SAMPLE_PRELOAD;
    });
    getEl('decodeBtn')?.addEventListener('click', () => {
      try {
        mergeCodes();
        const decoded = decodeClassic(fullCodeEl?.value, DEFAULT_PRESET, '');
        lastDecoded = decoded;
        setQuickFieldsFromDecoded(decoded);
        if (resultCodeBoxEl) resultCodeBoxEl.textContent = JSON.stringify({
          code1: code1El?.value || '',
          code2: code2El?.value || '',
          code3: code3El?.value || '',
          checksumMatched: decoded.checksumMatched,
          beforeStats: {
            Str: getEl('beforeStr')?.value || '',
            Agi: getEl('beforeAgi')?.value || '',
            Int: getEl('beforeInt')?.value || ''
          },
          codeStats: {
            Str: getEl('codeStr')?.value || '',
            Agi: getEl('codeAgi')?.value || '',
            Int: getEl('codeInt')?.value || ''
          },
          jsonStats: {
            Str: getEl('f42')?.value || '',
            Agi: getEl('f47')?.value || '',
            Int: getEl('f52')?.value || ''
          }
        }, null, 2);
      } catch (err) {
        if (resultCodeBoxEl) resultCodeBoxEl.textContent = `디코드 실패: ${err.message}`;
      }
    });
    getEl('applyStatSwapBtn')?.addEventListener('click', () => {
      const remap = getStatRemapFromDropdowns();
      applyStatRemap(remap);
      if (resultCodeBoxEl) resultCodeBoxEl.textContent = JSON.stringify({
        statRemap: remap,
        beforeStats: {
          Str: getEl('beforeStr')?.value || '',
          Agi: getEl('beforeAgi')?.value || '',
          Int: getEl('beforeInt')?.value || ''
        },
        codeStats: {
          Str: getEl('codeStr')?.value || '',
          Agi: getEl('codeAgi')?.value || '',
          Int: getEl('codeInt')?.value || ''
        },
        jsonStats: {
          Str: getEl('f42')?.value || '',
          Agi: getEl('f47')?.value || '',
          Int: getEl('f52')?.value || ''
        }
      }, null, 2);
    });
    getEl('encodeBtn')?.addEventListener('click', () => {
      try {
        if (!lastDecoded) throw new Error('먼저 디코드를 실행해줘.');
        syncStatPreview();
        const namedData = applyQuickFieldsToNamedData({ ...(lastDecoded.named || {}) });
        const encoded = encodeClassicFromNamed(namedData, DEFAULT_PRESET, '');
        if (code1El) code1El.value = encoded.code1;
        if (code2El) code2El.value = encoded.code2;
        if (code3El) code3El.value = encoded.code3;
        mergeCodes();
        if (resultCodeBoxEl) resultCodeBoxEl.textContent = JSON.stringify({
          code1: encoded.code1,
          code2: encoded.code2,
          code3: encoded.code3,
          beforeStats: {
            Str: getEl('beforeStr')?.value || '',
            Agi: getEl('beforeAgi')?.value || '',
            Int: getEl('beforeInt')?.value || ''
          },
          codeStats: {
            Str: getEl('codeStr')?.value || '',
            Agi: getEl('codeAgi')?.value || '',
            Int: getEl('codeInt')?.value || ''
          },
          jsonStats: {
            Str: getEl('f42')?.value || '',
            Agi: getEl('f47')?.value || '',
            Int: getEl('f52')?.value || ''
          }
        }, null, 2);
      } catch (err) {
        if (resultCodeBoxEl) resultCodeBoxEl.textContent = `인코드 실패: ${err.message}`;
      }
    });
    getEl('buildJsonBtn')?.addEventListener('click', () => {
      syncStatPreview();
      if (serverJsonBoxEl) serverJsonBoxEl.textContent = JSON.stringify(buildServerJson(), null, 2);
    });
    getEl('clearAllBtn')?.addEventListener('click', () => {
      [rawPreloadEl, code1El, code2El, code3El, fullCodeEl].forEach(el => { if (el) el.value = ''; });
      ['f42','f47','f52','f57','f162'].forEach(id => { const el = getEl(id); if (el) el.value = ''; });
      ['f28','f33','f38','f43','f48','f53'].forEach(id => { const el = getEl(id); if (el) el.value = '0'; });
      if (getEl('statFromStr')) getEl('statFromStr').value = '';
      if (getEl('statFromAgi')) getEl('statFromAgi').value = '';
      if (getEl('statFromInt')) getEl('statFromInt').value = '';
      lastDecoded = null;
      originalStats = { Str:'', Agi:'', Int:'' };
      ulbagData = {
        ULbag1:'0/0/0/0/0/0', ULbag1Ch:'0/0/0/0/0/0',
        ULbag2:'0/0/0/0/0/0', ULbag2Ch:'0/0/0/0/0/0',
        ULbag3:'0/0/0/0/0/0', ULbag3Ch:'0/0/0/0/0/0',
        ULbag4:'0/0/0/0/0/0', ULbag4Ch:'0/0/0/0/0/0',
        ULbag5:'0/0/0/0/0/0', ULbag5Ch:'0/0/0/0/0/0'
      };
      if (resultCodeBoxEl) resultCodeBoxEl.textContent = '아직 생성하지 않음';
      if (serverJsonBoxEl) serverJsonBoxEl.textContent = '아직 생성하지 않음';
    });

    code1El?.addEventListener('input', mergeCodes);
    code2El?.addEventListener('input', mergeCodes);
    code3El?.addEventListener('input', mergeCodes);
    getEl('f42')?.addEventListener('input', syncStatPreview);
    getEl('f47')?.addEventListener('input', syncStatPreview);
    getEl('f52')?.addEventListener('input', syncStatPreview);

    loadItemOptions().then(()=>{ populateItemSelects(); });
  </script>
</body>
</html>
