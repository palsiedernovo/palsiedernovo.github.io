<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Save Code Workbench</title>
<style>
body{font-family:Arial,Malgun Gothic;background:#f5f7fb;margin:0}
.wrap{max-width:1000px;margin:24px auto;padding:10px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
h2{margin:0 0 10px}
textarea,input,select{width:100%;padding:8px;border:1px solid #ccc;border-radius:8px;margin-bottom:10px}
button{padding:10px 14px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
button.secondary{background:#e5e7eb;color:#222}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
pre{background:#111827;color:#e5e7eb;padding:12px;border-radius:10px;min-height:120px;overflow:auto}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h2>1. Preload 붙여넣기</h2>
<textarea id="rawPreload" placeholder="call Preload(...) 전체 붙여넣기"></textarea>
<label>닉네임(ID)</label>
<input id="playerId">
<button id="loadBtn">불러오기</button>
<button class="secondary" id="sampleBtn">샘플</button>
</div>

<div class="card">
<h2>2. 스탯</h2>
<div class="grid">
<div>
<label>변경전 힘</label>
<input id="beforeStr" readonly>
</div>
<div>
<label>변경전 민</label>
<input id="beforeAgi" readonly>
</div>
<div>
<label>변경전 지</label>
<input id="beforeInt" readonly>
</div>
</div>

<div class="grid">
<div>
<label>JSON 힘</label>
<input id="jsonStr">
</div>
<div>
<label>JSON 민</label>
<input id="jsonAgi">
</div>
<div>
<label>JSON 지</label>
<input id="jsonInt">
</div>
</div>

<div class="grid">
<div>
<label>코드용 힘</label>
<input id="codeStr" readonly>
</div>
<div>
<label>코드용 민</label>
<input id="codeAgi" readonly>
</div>
<div>
<label>코드용 지</label>
<input id="codeInt" readonly>
</div>
</div>

<div class="grid">
<div>
<label>힘 →</label>
<select id="swapStr">
<option value="">변경없음</option>
<option value="힘">힘</option>
<option value="민">민</option>
<option value="지">지</option>
</select>
</div>
<div>
<label>민 →</label>
<select id="swapAgi">
<option value="">변경없음</option>
<option value="힘">힘</option>
<option value="민">민</option>
<option value="지">지</option>
</select>
</div>
<div>
<label>지 →</label>
<select id="swapInt">
<option value="">변경없음</option>
<option value="힘">힘</option>
<option value="민">민</option>
<option value="지">지</option>
</select>
</div>
</div>
</div>

<div class="card">
<h2>3. 아이템</h2>
<div class="grid">
<select id="item1"></select>
<select id="item2"></select>
<select id="item3"></select>
<select id="item4"></select>
<select id="item5"></select>
<select id="item6"></select>
</div>
</div>

<div class="card">
<h2>4. 결과 생성</h2>
<button id="generateBtn">코드 + JSON 생성</button>
</div>

<div class="card">
<h2>코드</h2>
<pre id="codeBox"></pre>
</div>

<div class="card">
<h2>서버 JSON</h2>
<pre id="jsonBox"></pre>
</div>

</div>

<script>
const CAP=728999

function cap(v){
v=Number(v||0)
return v>CAP?CAP:v
}

function updateCodeStats(){
const s=document.getElementById('jsonStr').value
const a=document.getElementById('jsonAgi').value
const i=document.getElementById('jsonInt').value

document.getElementById('codeStr').value=cap(s)
document.getElementById('codeAgi').value=cap(a)
document.getElementById('codeInt').value=cap(i)
}

function parsePreload(){
const txt=document.getElementById('rawPreload').value

function find(k){
const m=txt.match(new RegExp(k+":\\s*([^\\n\\r]+)"))
return m?m[1].trim():''
}

const str=find("Str")
const agi=find("Agi")
const int=find("Int")
const id=find("ID")

if(id)document.getElementById('playerId').value=id

document.getElementById('beforeStr').value=str
document.getElementById('beforeAgi').value=agi
document.getElementById('beforeInt').value=int

document.getElementById('jsonStr').value=str
document.getElementById('jsonAgi').value=agi
document.getElementById('jsonInt').value=int

updateCodeStats()
}

function buildJson(){
return {
Stats:document.getElementById('jsonStr').value+"/"+
      document.getElementById('jsonAgi').value+"/"+
      document.getElementById('jsonInt').value,
Code1:"@@@",
Code2:"@@@",
Code3:"@@@",
ULbag1:"0/0/0/0/0/0",
ULbag1Ch:"0/0/0/0/0/0",
ULbag2:"0/0/0/0/0/0",
ULbag2Ch:"0/0/0/0/0/0",
ULbag3:"0/0/0/0/0/0",
ULbag3Ch:"0/0/0/0/0/0",
ULbag4:"0/0/0/0/0/0",
ULbag4Ch:"0/0/0/0/0/0",
ULbag5:"0/0/0/0/0/0",
ULbag5Ch:"0/0/0/0/0/0"
}
}

function generate(){
updateCodeStats()
const j=buildJson()

document.getElementById('jsonBox').textContent=
JSON.stringify(j,null,2)

document.getElementById('codeBox').textContent=
"Code 생성 로직 연결 필요"
}

document.getElementById('loadBtn').onclick=parsePreload

document.getElementById('generateBtn').onclick=generate

['jsonStr','jsonAgi','jsonInt'].forEach(id=>{
document.getElementById(id).addEventListener('input',updateCodeStats)
})
</script>

</body>
</html>
