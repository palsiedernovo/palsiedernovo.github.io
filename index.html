<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Save Code Workbench</title>
<style>
body{font-family:Arial,"Malgun Gothic",sans-serif;background:#f5f7fb;margin:0}
.wrap{max-width:1100px;margin:24px auto;padding:10px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
h2{margin:0 0 10px}
label{display:block;font-weight:700;margin-bottom:6px}
textarea,input,select{width:100%;padding:10px 12px;border:1px solid #cfd6df;border-radius:8px;margin-bottom:10px;box-sizing:border-box;min-width:0}
button{padding:10px 14px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
button.secondary{background:#e5e7eb;color:#222}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:start}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-items:start}
pre{background:#111827;color:#e5e7eb;padding:12px;border-radius:10px;min-height:120px;overflow:auto;white-space:pre-wrap;word-break:break-word}
.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74;padding:10px 12px;border-radius:10px;line-height:1.5}
.muted{color:#666;font-size:13px}
@media (max-width:900px){.grid,.grid2{grid-template-columns:1fr}}
</style>
</head>

</div>

    <div><label>JSON 지</label><input id="jsonInt"></div>

  <div class="grid">

    <div><label>코드용 민</label><input id="codeAgi" readonly></div>
    <div><label>코드용 지</label><input id="codeInt" readonly></div>
  </div>
  <div class="grid">
    <div>
      <label>힘 →</label>
      <select id="swapStr">

    </div>

</div>

async function loadMasterJson(){
  try{
    const res = await fetch('./items.json');
    const json = await res.json();
    if(json && Array.isArray(json.DataDescriptions)){
      const itemDesc = json.DataDescriptions.find(d => Array.isArray(d.Index) && d.Index.includes(28));
      const charDesc = json.DataDescriptions.find(d => Array.isArray(d.Index) && d.Index.includes(57));

  }catch(e){

  }

}

function populateSelects(){
  ['item1','item2','item3','item4','item5','item6'].forEach(id => {

  });
  $('charNo').innerHTML = charOptions.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
}

function ensureOption(el, value, type){
  const exists = Array.from(el.options).some(o => String(o.value) === String(value));
  if(!exists){
    const opt = document.createElement('option');
    opt.value = String(value);
    opt.textContent = type === 'char' ? `캐릭터 ID ${value}` : `아이템 ID ${value}`;
    el.insertBefore(opt, el.firstChild);
  }
}

function parsePreloadText(txt){
  function escapeRegExp(str){
    return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function findPreloadValue(key){
    const safeKey = escapeRegExp(key);
    const re = new RegExp('call\\s+Preload\\s*\\(\\s*"' + safeKey + ':\\s*([^"\\r\\n]+)"\\s*\\)', 'i');
    const m = txt.match(re);
    return m ? m[1].trim() : '';
  }

  const parsed = {
    code1: findPreloadValue('Code1'),
    code2: findPreloadValue('Code2'),
    code3: findPreloadValue('Code3'),
    id: findPreloadValue('ID'),
    str: findPreloadValue('Str'),
    agi: findPreloadValue('Agi'),
    int: findPreloadValue('Int')
  };

  for(let i=1;i<=5;i++){
    const re = new RegExp('call\\s+Preload\\s*\\(\\s*"ULbag' + i + ':([^,\\"\\r\\n]+),ULbag' + i + 'Ch:([^\\"\\r\\n]+)"\\s*\\)', 'i');
    const m = txt.match(re);
    parsed[`ULbag${i}`] = m ? m[1].trim() : '0/0/0/0/0/0';
    parsed[`ULbag${i}Ch`] = m ? m[2].trim() : '0/0/0/0/0/0';
  }

  return parsed;
}

function applyPreload(parsed){
  if(parsed.id && !$('playerId').value) $('playerId').value = parsed.id;
  originalStats = { Str: parsed.str || '0', Agi: parsed.agi || '0', Int: parsed.int || '0' };
  ulbagData = {
    ULbag1: parsed.ULbag1, ULbag1Ch: parsed.ULbag1Ch,
    ULbag2: parsed.ULbag2, ULbag2Ch: parsed.ULbag2Ch,
    ULbag3: parsed.ULbag3, ULbag3Ch: parsed.ULbag3Ch,
    ULbag4: parsed.ULbag4, ULbag4Ch: parsed.ULbag4Ch,
    ULbag5: parsed.ULbag5, ULbag5Ch: parsed.ULbag5Ch
  };

  $('beforeAgi').value = originalStats.Agi;
  $('beforeInt').value = originalStats.Int;
  $('jsonStr').value = originalStats.Str;
  $('jsonAgi').value = originalStats.Agi;
  $('jsonInt').value = originalStats.Int;
  syncCodeStats();
  return (parsed.code1 || '') + (parsed.code2 || '') + (parsed.code3 || '');
}

function decodeClassic(fullCode, id){
  const saveLen = PRESET.udg_saveData;
  const saveName = PRESET.udg_saveDataName;
  const count = saveLen.length;
  const text = String(fullCode || '').replace(/[\r\n\t ]/g,'');
  const num = Math.ceil(count / 30);
  const headerRaw = sub(text, 0, saveLen[0]);
  const text2 = reverseStr(padLeft(toNotation2(toIntByKey(headerRaw, PRESET.udg_keySet)), num, '0'));
  let num2 = 0;
  let text3 = '';
  for(let i=0;i<num;i++){
    if(text2[i] === '1'){
      num2 += 5;
      const blockRaw = sub(text, num2, num2 + saveLen[i]);
      text3 += reverseStr(padLeft(toNotation2(toIntByKey(blockRaw, PRESET.udg_keySet)), 30, '0'));
    }else text3 += ''.padStart(30,'0');
  }
  if(text3.length > count) text3 = text3.substring(0,count);
  const arr = new Array(count).fill(0);
  let cursor = 0;
  for(let i=0;i<text3.length;i++){
    if(text3[i] === '1'){
      const raw = sub(text, cursor, cursor + saveLen[i]);
      arr[i] = toIntByKey(raw, PRESET.udg_keySet);
      cursor += saveLen[i];
    }
  }
  const named = {};
  for(let i=0;i<count;i++) named[saveName[i]] = arr[i];
  return { data: arr, named, checksumMatched: (arr[25] ?? null) === getChecksum(id, arr) };
}

function applySwap(){
  const map = getSwapMap();

  // 항상 변경전 스탯을 기준 소스로 사용해야 드롭다운을 여러 번 바꿔도 값이 꼬이지 않음
  const source = {
    힘: String($('beforeStr').value || ''),
    민: String($('beforeAgi').value || ''),
    지: String($('beforeInt').value || '')
  };

  const next = {
    힘: source.힘,
    민: source.민,
    지: source.지
  };

  Object.entries(map).forEach(([from, to]) => {
    if (!to || !Object.prototype.hasOwnProperty.call(next, to)) return;
    next[to] = source[from];
  });

  $('jsonStr').value = next.힘;
  $('jsonAgi').value = next.민;
  $('jsonInt').value = next.지;
  syncCodeStats();
}

}

function encodeClassic(named, id){
  const saveLen = PRESET.udg_saveData;
  const saveName = PRESET.udg_saveDataName;
  const count = saveLen.length;
  const keySet = PRESET.udg_keySet;
  const arr = new Array(count).fill(0);
  for(let i=0;i<count;i++){
    if(!dataOnBoolean(i)){
      const field = saveName[i];
      const raw = Number(named[field] ?? 0);
      const max = Math.pow(keySet.length, saveLen[i]);
      arr[i] = raw < max ? raw : Math.floor(max - 1);
    }
  }
  let bitText = '';
  for(let j=0;j<count;j++) bitText += ((arr[j]===0 && !dataOnBoolean(j)) ? '0' : '1');
  const blockCount = Math.ceil(count/30);
  for(let k=0;k<blockCount;k++) arr[k+1] = toInt2(reverseStr(sub(bitText, k*30, (k+1)*30)));
  let topBits = '1';
  let num3 = 1;
  while(num3 < count && num3 < 30){ topBits += ((arr[num3]===0 && num3!==25) ? '0' : '1'); num3++; }
  arr[1] = toInt2(reverseStr(topBits));
  arr[0] = toInt2(reverseStr(sub(topBits, 1, 25)));
  arr[25] = getChecksum(id, arr);
  let packed = '';
  for(let i=0;i<count;i++) if(arr[i] !== 0) packed += padLeft(toNotationByKey(arr[i], keySet), saveLen[i], keySet[0] || '0');
  const parts = [];
  const chunkCount = Math.ceil(packed.length / 127);
  for(let j=0;j<chunkCount;j++) parts.push(sub(packed, j*127, (j+1)*127));
  return { code1: parts[0] || '', code2: parts[1] || '', code3: parts.slice(2).join('') || '' };
}

function buildServerJson(codeParts){
  return {
    ULbag1: ulbagData.ULbag1 || '0/0/0/0/0/0',
    ULbag1Ch: ulbagData.ULbag1Ch || '0/0/0/0/0/0',
    ULbag2: ulbagData.ULbag2 || '0/0/0/0/0/0',
    ULbag2Ch: ulbagData.ULbag2Ch || '0/0/0/0/0/0',
    ULbag3: ulbagData.ULbag3 || '0/0/0/0/0/0',
    ULbag3Ch: ulbagData.ULbag3Ch || '0/0/0/0/0/0',
    ULbag4: ulbagData.ULbag4 || '0/0/0/0/0/0',
    ULbag4Ch: ulbagData.ULbag4Ch || '0/0/0/0/0/0',
    ULbag5: ulbagData.ULbag5 || '0/0/0/0/0/0',
    ULbag5Ch: ulbagData.ULbag5Ch || '0/0/0/0/0/0',
    Stats: `${$('jsonStr').value || '@@@'}/${$('jsonAgi').value || '@@@'}/${$('jsonInt').value || '@@@'}`,
    Code1: codeParts.code1 || '@@@',
    Code2: codeParts.code2 || '@@@',
    Code3: codeParts.code3 || '@@@'
  };
}

function loadAll(){
  const parsed = parsePreloadText($('rawPreload').value);
  const fullCode = applyPreload(parsed);
  const id = ($('playerId').value || '').trim() || parsed.id || '';
  if(!id) throw new Error('닉네임(ID)이 필요함');
  $('playerId').value = id;
  const decoded = decodeClassic(fullCode, id);
  reflectDecoded(decoded);
  $('codeBox').textContent = JSON.stringify({
    checksumMatched: decoded.checksumMatched,
    fullCodeLength: fullCode.length,
    parsedId: parsed.id,
    parsedStats: { Str: parsed.str, Agi: parsed.agi, Int: parsed.int }
  }, null, 2);
  $('jsonBox').textContent = JSON.stringify(buildServerJson({code1:parsed.code1,code2:parsed.code2,code3:parsed.code3}), null, 2);
  setStatus(`불러오기 완료 / 닉네임: ${id}`);
}

function generateAll(){
  if(!lastDecoded) throw new Error('먼저 불러오기를 실행해줘.');
  syncCodeStats();
  const id = $('playerId').value.trim();
  if(!id) throw new Error('닉네임(ID)이 필요함');
  const named = applyUiToNamed({...lastDecoded.named});
  const codeParts = encodeClassic(named, id);
  $('codeBox').textContent = JSON.stringify(codeParts, null, 2);
  $('jsonBox').textContent = JSON.stringify(buildServerJson(codeParts), null, 2);
  setStatus(`결과 생성 완료 / 닉네임: ${id}`);
}

$('loadBtn').addEventListener('click', () => {
  try{ loadAll(); }catch(e){ setStatus('불러오기 실패'); $('codeBox').textContent = `불러오기 실패: ${e.message}`; }
});
$('generateBtn').addEventListener('click', () => {
  try{ generateAll(); }catch(e){ setStatus('결과 생성 실패'); $('codeBox').textContent = `결과 생성 실패: ${e.message}`; }
});
$('sampleBtn').addEventListener('click', () => { $('rawPreload').value = SAMPLE; });
$('clearBtn').addEventListener('click', () => {
  $('rawPreload').value=''; $('playerId').value=''; setStatus('아직 불러오지 않음');
  ['beforeStr','beforeAgi','beforeInt','jsonStr','jsonAgi','jsonInt','codeStr','codeAgi','codeInt','heroSS'].forEach(id => $(id).value='');
  ['swapStr','swapAgi','swapInt'].forEach(id => $(id).value='');
  ['item1','item2','item3','item4','item5','item6','charNo'].forEach(id => $(id).value='0');
  $('codeBox').textContent='아직 생성하지 않음'; $('jsonBox').textContent='아직 생성하지 않음';
  originalStats = {Str:'',Agi:'',Int:''}; lastDecoded = null;
});
['jsonStr','jsonAgi','jsonInt'].forEach(id => $(id).addEventListener('input', syncCodeStats));
['swapStr','swapAgi','swapInt'].forEach(id => $(id).addEventListener('change', applySwap));
loadMasterJson();
</script>
